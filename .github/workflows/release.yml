name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (X.Y.Z)
        required: true
        type: string

concurrency:
  group: lonestar-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish verified release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Enforce main branch
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "main" || {
            echo "Release workflow must run from main. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          }

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Validate release metadata
        id: meta
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "Invalid version: $VERSION"
            exit 1
          }

          STYLE_VERSION="$(sed -nE 's@^[[:space:]*]*Version:[[:space:]]*([^[:space:]]+).*$@\1@p' style.css | head -n1 | tr -d '\r')"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          LOCK_VERSION="$(node -p "require('./package-lock.json').version")"
          test "$VERSION" = "$STYLE_VERSION" || { echo "style.css version mismatch"; exit 1; }
          test "$VERSION" = "$PACKAGE_VERSION" || { echo "package.json version mismatch"; exit 1; }
          test "$VERSION" = "$LOCK_VERSION" || { echo "package-lock.json version mismatch"; exit 1; }

          TAG="lonestar-v$VERSION"
          git rev-parse -q --verify "refs/tags/$TAG" >/dev/null && {
            echo "Tag already exists: $TAG"
            exit 1
          }

          NOTES="$RUNNER_TEMP/release-notes.md"
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > "$NOTES"
          sed -i '/./,$!d' "$NOTES"
          test -s "$NOTES" || { echo "Missing exact CHANGELOG section for $VERSION"; exit 1; }

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "asset=lonestar-$VERSION.zip" >> "$GITHUB_OUTPUT"
          echo "notes=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Install and validate
        run: |
          npm ci
          npm run validate:json
          npm run format:check
          npm test
          npm audit --audit-level=high
          npm run build
          npm run package:check
          git diff --exit-code -- dist

      - name: Lint PHP files
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find . -path './node_modules' -prune -o -type f -name '*.php' -print0)

      - name: Package and inspect theme
        id: package
        shell: bash
        env:
          ASSET: ${{ steps.meta.outputs.asset }}
        run: |
          set -euo pipefail
          STAGE_ROOT="$RUNNER_TEMP/lonestar-release"
          STAGE_THEME="$STAGE_ROOT/lonestar"
          OUTPUT="$RUNNER_TEMP/$ASSET"
          CHECKSUM="$OUTPUT.sha256"
          rm -rf "$STAGE_ROOT"
          mkdir -p "$STAGE_THEME"

          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='scripts' \
            --exclude='docs' \
            --exclude='AGENTS.md' \
            --exclude='CONTRIBUTING.md' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='vite.config.mjs' \
            --exclude='vite-entry-points.mjs' \
            --exclude='vite-block-discovery.mjs' \
            --exclude='postcss.config.js' \
            --exclude='.editorconfig' \
            --exclude='.gitattributes' \
            --exclude='.prettierignore' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            ./ "$STAGE_THEME/"

          test -f "$STAGE_THEME/style.css"
          test -f "$STAGE_THEME/functions.php"
          test -f "$STAGE_THEME/theme.json"
          test -f "$STAGE_THEME/dist/manifest.json"
          (cd "$STAGE_ROOT" && zip -rq "$OUTPUT" lonestar)

          ZIP_LIST="$RUNNER_TEMP/zip-list.txt"
          unzip -Z1 "$OUTPUT" > "$ZIP_LIST"
          awk 'index($0, "lonestar/") != 1 { bad=1 } END { exit bad }' "$ZIP_LIST"
          if grep -E '(^|/)(\.git|\.github|node_modules|tests|scripts|docs)(/|$)|(^|/)\.env([./]|$)' "$ZIP_LIST"; then
            echo "Forbidden path found in release ZIP"
            exit 1
          fi

          (cd "$(dirname "$OUTPUT")" && sha256sum "$ASSET" > "$CHECKSUM")
          sha256sum --check "$CHECKSUM"
          echo "asset_path=$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Attest release artifact
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: ${{ steps.package.outputs.asset_path }}

      - name: Create annotated tag
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Lonestar v$VERSION"
          git push origin "$TAG"

      - name: Create and verify draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          NOTES: ${{ steps.meta.outputs.notes }}
          ASSET_PATH: ${{ steps.package.outputs.asset_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
          ASSET_NAME: ${{ steps.meta.outputs.asset }}
        run: |
          set -euo pipefail
          gh release create "$TAG" "$ASSET_PATH" "$CHECKSUM_PATH" \
            --draft \
            --verify-tag \
            --title "Lonestar v$VERSION" \
            --notes-file "$NOTES"

          EXPECTED="$(cut -d' ' -f1 "$CHECKSUM_PATH")"
          ACTUAL="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" --jq ".assets[] | select(.name == \"$ASSET_NAME\") | .digest" | sed 's/^sha256://')"
          test -n "$ACTUAL" || { echo "GitHub did not expose an asset digest"; exit 1; }
          test "$EXPECTED" = "$ACTUAL" || { echo "GitHub asset digest mismatch"; exit 1; }

          gh release edit "$TAG" --draft=false --latest
