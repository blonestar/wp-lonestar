name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate JSON and formatting
        run: |
          npm run validate:json
          npm run format:check

      - name: Test contracts
        run: npm test

      - name: Audit production tooling
        run: npm audit --audit-level=high

      - name: Build assets
        run: npm run build

      - name: Reject uncommitted build drift
        run: git diff --exit-code -- dist

      - name: Validate release package contract
        run: npm run package:check

  php:
    name: PHP ${{ matrix.php }} lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.4"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint PHP files
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find . -path './node_modules' -prune -o -type f -name '*.php' -print0)

      - name: Test content types runtime
        run: php tests/content-types-runtime.php
